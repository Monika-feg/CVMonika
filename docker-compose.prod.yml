services:
  cvmonika:
    image: 'ghcr.io/evolvitsolutions/cvmonika:latest'
    restart: unless-stopped
    pull_policy: always
    ports:
      - 8080:8080
    environment:
      APP_ENV: '${APP_ENV:-production}'
      APP_URL: '${APP_URL:-http://localhost:8080}'
      APP_NAME: '${APP_NAME:-MW Fortnox}'
      APP_VERSION: '${APP_VERSION:-1.0.0}'
      AUTORUN_ENABLED: '${AUTORUN_ENABLED:-true}'
      DB_CONNECTION: '${DB_CONNECTION:-pgsql}'
      DB_HOST: '${DB_HOST:-db}'
      DB_PORT: '${DB_PORT:-5432}'
      DB_PORT_INNER: '${DB_PORT_INNER:-5432}'
      DB_DATABASE: '${DB_DATABASE:-cvmonika}'
      DB_USERNAME: '${DB_USERNAME:-postgres}'
      DB_PASSWORD: '${DB_PASSWORD:-postgres}'
    expose:
      - 8080
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl --fail http://127.0.0.1:8080/healthcheck || exit 1'
      interval: 5s
      retries: 10
      timeout: 2s
    networks:
      - cvmonika
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  nightwatch-agent:
    image: laravelphp/nightwatch-agent:latest
    environment:
      - NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}
    healthcheck:
      test: php nightwatch-status
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - cvmonika
  # Database Service
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:${DB_PORT_INNER:-5432}'
    volumes:
      - cvmonika-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_DATABASE:-cvmonika}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-cvmonika}']
      interval: 5s
      retries: 10
      timeout: 2s
    networks:
      - cvmonika
  # Redis Service
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: '${REDIS_PASSWORD}'
    volumes:
      - cvmonika-redis:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD} ping || exit 1']
      interval: 5s
      retries: 10
      timeout: 2s
    networks:
      - cvmonika

# Volumes
volumes:
  cvmonika-db:
    name: cvmonika-db
  cvmonika-redis:
    name: cvmonika-redis

# Networks
networks:
  cvmonika:
    name: cvmonika
    external: false
