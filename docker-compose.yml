services:
  cvmonika:
    build:
      context: .
      dockerfile: ./docker/development/dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-dev}
    ports:
      - '${APP_PORT:-8080}:8080'
    volumes:
      - .:/var/www/html:cached
    env_file:
      - .env
    environment:
      VITE_HOST: '${VITE_HOST:-0.0.0.0}'
      VITE_PORT: '${VITE_PORT:-5173}'
      VITE_APP_VERSION: '${APP_VERSION:-dev}'
      VITE_APP_NAME: '${APP_NAME:-cvmonika}'
      AUTORUN_ENABLED: false
      APP_ENV: development
      APP_DEBUG: true
      APP_URL: http://localhost:8080
      APP_NAME: '${APP_NAME:-cvmonika}'
      LARAVEL_AUTOMATIONS: 'false'
    networks:
      - cvmonika
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  scheduler:
    build:
      context: .
      dockerfile: ./docker/development/dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-dev}
    container_name: cvmonika-scheduler
    volumes:
      - .:/var/www/html:cached
    env_file:
      - .env
    environment:
      APP_ENV: development
      APP_DEBUG: true
    command: sh -c "php artisan queue:work --timeout=1800"
    networks:
      - cvmonika
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  vite:
    image: node:20-alpine
    pull_policy: always
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      VITE_HOST: '${VITE_HOST:-0.0.0.0}'
      VITE_PORT: '${VITE_PORT:-5173}'
      VITE_APP_VERSION: '${APP_VERSION:-dev}'
      VITE_APP_NAME: '${APP_NAME:-repotracker}'
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    volumes:
      - .:/var/www/html:cached
    command: sh -c "npm install && npm run dev"
    networks:
      - cvmonika
  # Database Service
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-cvmonika}
    ports:
      - '${DB_PORT:-5432}:${DB_PORT_INNER:-5432}'
    volumes:
      - cvmonika-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-cvmonika}']
      interval: 5s
      retries: 10
      timeout: 2s
    networks:
      - cvmonika

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - '${PGADMIN_PORT:-8081}:80'
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_ENHANCED_IAM_AUTHENTICATION: 'False'
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 10
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cvmonika
  # Redis Service
  redis:
    image: redis:7-alpine
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: '${REDIS_PASSWORD}'
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - cvmonika-redis:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD} ping || exit 1']
      interval: 5s
      retries: 10
      timeout: 2s
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    networks:
      - cvmonika

# Volumes
volumes:
  cvmonika-db:
    name: cvmonika-db
  cvmonika-redis:
    name: cvmonika-redis

# Networks
networks:
  cvmonika:
    name: cvmonika
    external: false
